# Production stack for Coolify (Build Pack: Docker Compose).
#
# Nothing is hardcoded. Coolify auto-generates every secret from the
# SERVICE_* magic variables and exposes them as editable env vars:
#   SERVICE_FQDN_PAYLOAD_3000   -> generates a domain and routes it to container port 3000
#   SERVICE_URL_PAYLOAD         -> full public URL with scheme (e.g. https://payload.tzhk.dev)
#   SERVICE_BASE64_64_PAYLOADSECRET -> 64-char Payload secret
#   SERVICE_USER_POSTGRES       -> generated DB user
#   SERVICE_PASSWORD_POSTGRES   -> generated DB password
# The `:-` fallbacks let the same file also run locally via `docker compose up`.
services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Declared so Coolify sets up proxy routing to container port 3000.
      - SERVICE_FQDN_PAYLOAD_3000
      # Public URL of the CMS. Use ONLY the clean SERVICE_URL_PAYLOAD
      # (https://payload.tzhk.dev). We deliberately do NOT fall back to the
      # *_3000 variants — Coolify appends ":3000" to those, which is a broken
      # public URL (browsers would hit port 3000 over TLS). If unset, leave it
      # empty so Payload derives the URL from the incoming request instead.
      - PAYLOAD_PUBLIC_SERVER_URL=${SERVICE_URL_PAYLOAD:-}
      # Override to allow your site's domains to call the API, comma-separated.
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      # Secret used to sign tokens.
      - PAYLOAD_SECRET=${SERVICE_BASE64_64_PAYLOADSECRET:-change-me-locally}
      # Database connection, assembled from the generated Postgres creds.
      - DATABASE_URI=postgres://${SERVICE_USER_POSTGRES:-postgres}:${SERVICE_PASSWORD_POSTGRES:-postgres}@postgres:5432/${POSTGRES_DB:-payload}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # busybox wget (Alpine) has no --spider; -O /dev/null works everywhere.
      test: ['CMD', 'wget', '-q', '-O', '/dev/null', 'http://127.0.0.1:3000/admin/login']
      interval: 10s
      timeout: 20s
      retries: 15
      start_period: 60s

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${SERVICE_USER_POSTGRES:-postgres}
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_POSTGRES:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-payload}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces TCP auth (avoids the "peer authentication" failure).
      test: ['CMD-SHELL', 'pg_isready -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 20s
      retries: 10

volumes:
  pgdata:
